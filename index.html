<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js" defer type="module"></script>
    <title>Contatos</title>
</head>
<body>
    <header>
        <span>Usuários</span>
        <img src="./img/usuario-sem-icone.png" alt="imagem de usuário sem icone">
    </header>
    <main>
        <section class="formulario">
            <h2>Gerenciar Pessoas</h2>
            <div class="container">
                <h3>Dados Pessoais</h3>
                <div class="campos-formulario">
                    <label for="nome">
                        Nome
                        <input type="text" id="nomeInput" placeholder="Ex: Matheus Henry dos Santos">
                    </label>
                    <label for="">
                        Telefone
                        <input type="text" id="numeroInput" placeholder="Ex: 11987654321">
                    </label>
                    <label for="">
                        Foto
                        <input type="text" id="fotoInput" placeholder="Ex: https//:img...">
                    </label>
                    <label for="">
                        E-mail
                        <input type="text" id="emailInput" placeholder="Ex: 09matheushenry@gmail.com">
                    </label>
                    <label for="">
                        Endereço
                        <input type="text" id="enderecoInput" placeholder="Ex: Profº Vicente Amato">
                    </label>
                    <label for="">
                        Cidade
                        <input type="text" id="cidadeInput" placeholder="Ex: Jandira">
                    </label>
                </div>
                <button id="salvar" onclick="">Salvar</button>
            </div>
        </section>
        <section class="lista">
            <hr>
            <h2>Lista de Pessoas</h2>
            <div id="cards"></div>
        </section>
    </main>
    <footer>
            <span>© 2026 • Matheus Henry.</span>
    </footer>
</body>
</html>
